<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>商品輸入</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main id="app" class="app">
      <header class="header">
        <h1>商品輸入</h1>
        <p class="operator-display">作業者：<span id="operator-label"></span></p>
      </header>

      <section class="card" id="operator-section">
        <label for="operator-input">作業者名字</label>
        <input id="operator-input" type="text" placeholder="輸入你的名字" autocomplete="name" />
      </section>

      <section class="card">
        <button type="button" id="start-scan-btn" class="btn btn-primary btn-block">開始連續掃描</button>
        <p class="hint">相機常駐，掃到即寫入。描述／備註事後在 Google Sheet 補。</p>
        <h3 class="recent-title">最近掃描</h3>
        <ul id="recent-list" class="recent-list"></ul>
      </section>
    </main>

    <div id="scanner-overlay" class="overlay hidden" aria-hidden="true">
      <video id="scanner-video" playsinline muted></video>
      <div class="scanner-frame"></div>
      <p id="scan-status" class="scanner-hint">掃描中…</p>
      <div class="scanner-controls">
        <label class="toggle">
          <input type="checkbox" id="voice-toggle" />
          <span>語音補描述</span>
        </label>
        <button type="button" id="skip-voice-btn" class="btn btn-secondary">跳過語音</button>
        <button type="button" id="retry-btn" class="btn btn-secondary">重送</button>
      </div>
      <button type="button" id="scanner-cancel" class="btn btn-secondary">結束掃描</button>
    </div>

    <div id="toast" class="toast hidden" role="status"></div>
    <p class="version-tag" aria-hidden="true">v2.0 連續掃描</p>

    <script src="config.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
